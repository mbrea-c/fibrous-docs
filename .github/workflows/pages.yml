# Build the static site with Nix and publish it to GitHub Pages.
#
# NOTE: this needs the flake inputs in flake.nix switched from relative
# `path:` URLs to `github:` URLs (see the TODO there) — the sibling checkouts
# don't exist on the runner. Until then, trigger manually after switching, or
# keep deploying from a machine that has the siblings and push the artifact.
#
# One-time repo setup: Settings → Pages → Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Build site
        run: nix build .#site
      # dereference the store symlink; Pages wants plain uploadable files
      - name: Materialize webroot
        run: |
          cp -rL result public
          chmod -R u+w public
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
